<uiView>
  <div id="drifttest">

    <!-- Title + mode (read-only) -->
    <div class="cm-fg" style="width:100%;height:16%">
      <div class="cm-mid" style="top:calc(35% - 50%e); left:calc(50% - 50%e); font-size: 12px;">DRIFT TEST</div>
      <div id="modeLabel" class="cm-mid"
        style="top:calc(75% - 50%e); left:calc(50% - 50%e); font-size: 14px;">PACE</div>
    </div>

    <!-- Countdown (hero) -->
    <div class="f-num" style="top:calc(38% - 50%e); left:calc(50% - 50%e); font-size: 56px;">
      <eval input="/Zapp/{zapp_index}/Output/countdown" outputFormat="Duration_FourdigitsFixed" default="--" />
    </div>
    <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 11px;">WARMUP</div>

    <!-- HR warning (hidden by default, toggled via setStyle) -->
    <div id="hrWarn" style="top:calc(56% - 50%e); left:calc(50% - 50%e); font-size: 20px; visibility:hidden;">SLOW DOWN</div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:58%;width:70%;height:1px;opacity:0.4"></div>

    <!-- HR + MAF side by side -->
    <div class="cm-mid" style="top:calc(63% - 50%e); left:calc(30% - 50%e); font-size: 11px;">HR</div>
    <div id="hrValue" class="f-num" style="top:calc(71% - 50%e); left:calc(30% - 50%e); font-size: 28px;">
      <eval input="/Activity/Move/-1/Heartrate/Current" outputFormat="HeartRate_Fourdigits" default="--" />
    </div>

    <div id="mafLabel" class="cm-mid" style="top:calc(63% - 50%e); left:calc(70% - 50%e); font-size: 11px;">MAF</div>
    <div class="f-num" style="top:calc(71% - 50%e); left:calc(70% - 50%e); font-size: 28px;">
      <eval input="/Zapp/{zapp_index}/Output/mafDisplay" outputFormat="HeartRate_Fourdigits" default="--" />
    </div>

    <!-- Skip: tap triggers a lap → onLap() skips warmup. On watch, physical down button does the same. -->
    <div onTap="$.put('/Activity/Trigger', 23);"
      style="top:82%;left:15%;width:70%;height:16%;position:absolute;">
      <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 12px; opacity:0.6;">TAP TO SKIP</div>
    </div>

  </div>

  <!-- Physical buttons -->
  <userInput>
    <pushButton name="down" onClick="$.put('/Activity/Trigger', 23);" />
  </userInput>
</uiView>
