<uiView>
  <div id="drifttest">

    <!-- Title -->
    <div class="cm-fg" style="width:100%;height:14%">
      <div class="cm-mid" style="top:calc(35% - 50%e); left:calc(50% - 50%e); font-size: 12px;">DRIFT TEST</div>
      <div class="cm-mid" style="top:calc(75% - 50%e); left:calc(50% - 50%e); font-size: 11px;">SETUP</div>
    </div>

    <!-- Mode selector -->
    <div class="cm-mid" style="top:calc(20% - 50%e); left:calc(50% - 50%e); font-size: 10px;">MODE</div>
    <div id="modeName" class="cm-mid"
      onTap="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
      style="top:calc(28% - 50%e); left:calc(50% - 50%e); font-size: 28px;">PACE</div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:36%;width:70%;height:1px;opacity:0.4"></div>

    <!-- Warmup + Test side by side -->
    <div class="cm-mid" style="top:calc(40% - 50%e); left:calc(30% - 50%e); font-size: 9px; opacity:0.5;">WARMUP</div>
    <div id="warmupVal" class="f-num"
      onTap="$.put('/Zapp/{zapp_index}/Event', 10, null, 'int32');"
      style="top:calc(48% - 50%e); left:calc(30% - 50%e); font-size: 28px;">15</div>
    <div class="cm-mid" style="top:calc(55% - 50%e); left:calc(30% - 50%e); font-size: 8px; opacity:0.4;">MIN</div>

    <div class="cm-mid" style="top:calc(40% - 50%e); left:calc(70% - 50%e); font-size: 9px; opacity:0.5;">TEST</div>
    <div id="testVal" class="f-num"
      onTap="$.put('/Zapp/{zapp_index}/Event', 12, null, 'int32');"
      style="top:calc(48% - 50%e); left:calc(70% - 50%e); font-size: 28px;">60</div>
    <div class="cm-mid" style="top:calc(55% - 50%e); left:calc(70% - 50%e); font-size: 8px; opacity:0.4;">MIN</div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:60%;width:70%;height:1px;opacity:0.4"></div>

    <!-- MAF + Watts side by side -->
    <div class="cm-mid" style="top:calc(64% - 50%e); left:calc(30% - 50%e); font-size: 9px; opacity:0.5;">MAF</div>
    <div id="mafVal" class="f-num"
      onTap="$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');"
      style="top:calc(72% - 50%e); left:calc(30% - 50%e); font-size: 28px;">140</div>

    <div id="wattsLabel" class="cm-mid"
      style="top:calc(64% - 50%e); left:calc(70% - 50%e); font-size: 9px; opacity:0.5;">-</div>
    <div id="wattsValue" class="f-num"
      onTap="$.put('/Zapp/{zapp_index}/Event', 14, null, 'int32');"
      style="top:calc(72% - 50%e); left:calc(70% - 50%e); font-size: 28px;">-</div>

    <!-- START button -->
    <div onTap="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');"
      style="top:82%;left:15%;width:70%;height:16%;position:absolute;">
      <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 14px;">START</div>
    </div>

  </div>

  <!-- Physical buttons: up=toggle mode, down=START -->
  <userInput>
    <pushButton name="up"
      onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" />
    <pushButton name="down"
      onClick="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
  </userInput>
</uiView>
